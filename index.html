<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Presensi Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div id="root" class="w-full max-w-lg"></div>

    <script type="text/babel">
        const { useState } = React;

        // URL Apps Script Baru yang Anda berikan
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwYgXTz013rnfavqcTtaEwlPNF26prYtYBb-BHAougMkGgGw8OdQufSgSQa-e9ol8nd/exec"; 

        function App() {
            const [formData, setFormData] = useState({
                tanggal: new Date().toISOString().split('T')[0],
                id: '',
                nama: '',
                hub: '',
                email: '',
                status: 'HADIR'
            });
            const [loading, setLoading] = useState(false);
            const [searching, setSearching] = useState(false);
            const [feedback, setFeedback] = useState({ type: '', text: '' });

            const handleLookup = async () => {
                if (!formData.id) return;
                setSearching(true);
                try {
                    const response = await fetch(`${SCRIPT_URL}?action=lookup&id=${formData.id}`);
                    const result = await response.json();
                    if (result.status === "success") {
                        setFormData(prev => ({
                            ...prev,
                            nama: result.data.nama,
                            hub: result.data.hub,
                            email: result.data.email
                        }));
                        setFeedback({ type: 'success', text: 'Data ditemukan otomatis!' });
                    }
                } catch (e) { 
                    console.error("Lookup error:", e); 
                } finally { 
                    setSearching(false);
                    setTimeout(() => setFeedback({type:'', text:''}), 3000);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setFeedback({ type: 'info', text: 'Mengirim data...' });

                try {
                    // Mengirim data ke Google Apps Script
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors', // Penting untuk Apps Script
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData)
                    });

                    // Karena mode no-cors, kita mengasumsikan sukses jika fetch tidak throw error
                    setFeedback({ type: 'success', text: 'Presensi Berhasil Dikirim!' });
                    setFormData({
                        tanggal: new Date().toISOString().split('T')[0],
                        id: '', nama: '', hub: '', email: '', status: 'HADIR'
                    });
                } catch (err) {
                    setFeedback({ type: 'error', text: 'Gagal: ' + err.message });
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="bg-white p-8 rounded-[2.5rem] shadow-2xl border border-slate-100">
                    <div className="text-center mb-8">
                        <div className="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-100">
                            <i className="fas fa-calendar-check text-white text-2xl"></i>
                        </div>
                        <h1 className="text-2xl font-black text-slate-800 tracking-tight">E-PRESENSI</h1>
                        <p className="text-slate-500 text-xs mt-1 uppercase tracking-widest font-bold">Data Management System</p>
                    </div>

                    {feedback.text && (
                        <div className={`mb-6 p-4 rounded-2xl text-[11px] font-bold text-center animate-pulse ${
                            feedback.type === 'success' ? 'bg-green-50 text-green-700' :
                            feedback.type === 'error' ? 'bg-red-50 text-red-700' : 'bg-blue-50 text-blue-700'
                        }`}>
                            {feedback.text}
                        </div>
                    )}

                    <form onSubmit={handleSubmit} className="space-y-4">
                        <div className="grid grid-cols-2 gap-4">
                            <div className="space-y-1">
                                <label className="text-[10px] font-bold text-slate-400 ml-1 uppercase">Tanggal</label>
                                <input type="date" required value={formData.tanggal}
                                    onChange={(e) => setFormData({...formData, tanggal: e.target.value})}
                                    className="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500" />
                            </div>
                            <div className="space-y-1">
                                <label className="text-[10px] font-bold text-slate-400 ml-1 uppercase">ID Personel</label>
                                <div className="relative">
                                    <input type="text" required placeholder="Cth: 001"
                                        value={formData.id} onBlur={handleLookup}
                                        onChange={(e) => setFormData({...formData, id: e.target.value})}
                                        className="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500 font-bold uppercase" />
                                    {searching && <i className="fas fa-spinner fa-spin absolute right-4 top-5 text-blue-500"></i>}
                                </div>
                            </div>
                        </div>

                        <div className="space-y-1">
                            <label className="text-[10px] font-bold text-slate-400 mb-2 block text-center uppercase tracking-widest">Status Kehadiran</label>
                            <div className="flex gap-2">
                                {['HADIR', 'IZIN', 'LIBUR'].map(s => (
                                    <button
                                        key={s} type="button"
                                        onClick={() => setFormData({...formData, status: s})}
                                        className={`flex-1 py-4 rounded-2xl font-black text-[10px] transition-all border-2 ${
                                            formData.status === s 
                                            ? 'bg-blue-600 border-blue-600 text-white shadow-lg' 
                                            : 'bg-white border-slate-100 text-slate-400 hover:border-blue-200'
                                        }`}
                                    >
                                        {s === 'HADIR' ? '✅ ' : s === 'IZIN' ? '📝 ' : '🏠 '} {s}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="space-y-1">
                            <label className="text-[10px] font-bold text-slate-400 ml-1 uppercase">Nama Lengkap</label>
                            <input type="text" required placeholder="Nama sesuai database"
                                value={formData.nama}
                                onChange={(e) => setFormData({...formData, nama: e.target.value})}
                                className="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500" />
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                            <div className="space-y-1">
                                <label className="text-[10px] font-bold text-slate-400 ml-1 uppercase">HUB</label>
                                <input type="text" required placeholder="Lokasi HUB"
                                    value={formData.hub}
                                    onChange={(e) => setFormData({...formData, hub: e.target.value})}
                                    className="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500" />
                            </div>
                            <div className="space-y-1">
                                <label className="text-[10px] font-bold text-slate-400 ml-1 uppercase">Email</label>
                                <input type="email" required placeholder="email@anda.com"
                                    value={formData.email}
                                    onChange={(e) => setFormData({...formData, email: e.target.value})}
                                    className="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500" />
                            </div>
                        </div>

                        <button type="submit" disabled={loading}
                            className={`w-full py-5 rounded-3xl font-black text-white shadow-xl transition-all active:scale-95 ${
                                loading ? 'bg-slate-300' : 'bg-blue-600 hover:bg-blue-700 shadow-blue-100'
                            }`}>
                            {loading ? <i className="fas fa-circle-notch fa-spin"></i> : 'SUBMIT PRESENSI'}
                        </button>
                    </form>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
